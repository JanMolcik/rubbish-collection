<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V4.1 — Jarní Les | Svoz odpadů Lípa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════════════════════════
       LIGHT THEME — Jarní Les (Spring Forest)
       All contrast ratios verified WCAG AA (≥4.5:1 normal, ≥3:1 large)
       primary #1a5c2e on white ≈ 8.9:1 ✓
       text    #0d1f10 on white ≈ 19:1  ✓
       dim     #4a6252 on white ≈ 5.4:1 ✓
    ═══════════════════════════════════════════════════ */
    :root {
      --bg:          #ffffff;
      --bg-card:     #f5f8f5;
      --bg-stripe:   #eef4ef;
      --dot:         rgba(26, 92, 46, 0.09);
      --primary:     #1a5c2e;
      --primary-fg:  #ffffff;
      --accent:      #c47d00;
      --text:        #0d1f10;
      --text-dim:    #4a6252;
      --border:      #cdddd0;
      --border-lt:   #e4ede6;
      --cell-sep:    #e2eae4;
      --today-bg:    #1a5c2e;
      --today-fg:    #ffffff;
      --hero-bg:     #0f3a1c;
      --hero-green:  #6abf7a;
      --hero-dim:    #a0ccaa;
      --toggle-bg:   rgba(255,255,255,0.15);
      --toggle-border: rgba(255,255,255,0.35);
    }

    /* ═══════════════════════════════════════════════════
       DARK THEME — Jarní Les Noční (Night Forest)
       primary #4ade80 on #0b140d ≈ 13.2:1 ✓
       text    #e8f5eb on #0b140d ≈ 18.1:1 ✓
       dim     #7aaa82 on #0b140d ≈  7.8:1 ✓
       today circle: #4ade80 bg + #061008 text ≈ 13.2:1 ✓
    ═══════════════════════════════════════════════════ */
    [data-theme="dark"] {
      --bg:          #0b140d;
      --bg-card:     #111c13;
      --bg-stripe:   #162018;
      --dot:         rgba(74, 222, 128, 0.08);
      --primary:     #4ade80;
      --primary-fg:  #061008;
      --accent:      #f0c060;
      --text:        #e8f5eb;
      --text-dim:    #7aaa82;
      --border:      #1e3022;
      --border-lt:   #182818;
      --cell-sep:    #172417;
      --today-bg:    #4ade80;
      --today-fg:    #061008;
      --hero-bg:     #060d07;
      --hero-green:  #4ade80;
      --hero-dim:    #7aaa82;
      --toggle-bg:   rgba(0,0,0,0.25);
      --toggle-border: rgba(74,222,128,0.4);
    }

    /* Smooth transition on theme switch */
    html.theme-switching,
    html.theme-switching * {
      transition:
        background-color 0.28s ease,
        color 0.22s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease !important;
    }

    /* ─── BASE ─────────────────────────────────────────── */
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 24px 24px;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }

    /* ─── TOP BAR ──────────────────────────────────────── */
    .topbar {
      background: var(--primary);
      color: var(--primary-fg);
      padding: 0 1rem;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .topbar-brand {
      font-family: 'Anton', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      flex: 1;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .topbar-year {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      opacity: 0.72;
    }

    /* ─── THEME TOGGLE ─────────────────────────────────── */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--toggle-border);
      background: var(--toggle-bg);
      color: var(--primary-fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s ease, background 0.2s ease;
      padding: 0;
    }

    .theme-toggle:hover {
      transform: rotate(22deg) scale(1.08);
      background: rgba(255,255,255,0.25);
    }

    [data-theme="dark"] .theme-toggle:hover {
      background: rgba(74,222,128,0.2);
    }

    .theme-toggle svg {
      width: 17px; height: 17px;
      stroke: currentColor; stroke-width: 2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Icon switching */
    .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun  { display: none; }
    [data-theme="dark"] .icon-moon { display: block; }

    /* ─── HERO ─────────────────────────────────────────── */
    .hero {
      background: var(--hero-bg);
      color: var(--hero-green);
      padding: 1.25rem 1rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Gradient shimmer in hero */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 90% 40%, rgba(106,191,122,0.1), transparent 55%);
      pointer-events: none;
    }

    /* Bottom accent line into calendar */
    .hero-bottom-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--hero-green), transparent 80%);
      opacity: 0.4;
    }

    .hero-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--hero-green);
      margin-bottom: 0.55rem;
    }

    .hero-body {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1rem;
      align-items: start;
    }

    .hero-lead {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      line-height: 0.92;
      letter-spacing: 0.01em;
      color: #ffffff;
    }

    .hero-date {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--hero-dim);
      margin-top: 0.3rem;
    }

    .hero-count { text-align: center; }

    .hero-num {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      line-height: 1;
      color: var(--hero-green);
    }

    [data-theme="dark"] .hero-num {
      text-shadow: 0 0 28px rgba(74,222,128,0.45);
    }

    .hero-unit {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hero-green);
    }

    /* Category badges strip */
    .hero-cats {
      padding: 0.65rem 1rem;
      background: var(--bg-card);
      border-bottom: 2px solid var(--primary);
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .hero-cats-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-right: 0.15rem;
    }

    .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 0.22rem 0.65rem;
      border-radius: 999px;
      border: 1.5px solid;
      background: transparent;
      transition: background 0.15s;
    }

    .cat-badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── CALENDAR ─────────────────────────────────────── */
    .calendar { background: var(--bg); }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.5rem;
      background: var(--bg-card);
    }

    .view-switch {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }

    .view-btn {
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0.42rem 0.85rem;
      cursor: pointer;
      border-right: 1px solid var(--border);
      min-height: 40px;
      transition: background 0.12s, color 0.12s;
    }

    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: var(--primary); color: var(--primary-fg); }
    .view-btn:hover:not(.active) { background: var(--bg-stripe); color: var(--text); }

    .nav-row { display: flex; align-items: center; gap: 0.5rem; }

    .nav-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-fg);
    }

    .nav-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor; stroke-width: 2.2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    .interval-lbl {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      min-width: 130px;
    }

    .cal-body { background: var(--bg); }

    /* ─── iOS-STYLE MONTH GRID ─────────────────────────── */
    .weekday-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .weekday-lbl {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0.45rem 0;
    }

    /* Weekends use accent on both themes */
    .weekday-lbl.weekend { color: var(--accent); }

    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

    .month-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5px 2px 7px;
      min-height: 54px;
      border-bottom: 0.5px solid var(--cell-sep);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .month-cell:active  { background: var(--bg-stripe); }
    .month-cell.selected { background: var(--bg-stripe); }

    .cell-num {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      line-height: 1;
    }

    .month-cell.today .cell-num {
      background: var(--today-bg);
      color: var(--today-fg);
      font-weight: 700;
    }

    [data-theme="dark"] .month-cell.today .cell-num {
      box-shadow: 0 0 16px rgba(74,222,128,0.4);
    }

    .month-cell.weekend .cell-num { color: var(--text-dim); }
    .month-cell.other-month { opacity: 0.28; pointer-events: none; }

    .cell-pills {
      display: flex;
      gap: 2px;
      justify-content: center;
      min-height: 5px;
      overflow: hidden;
      max-width: 90%;
    }

    .cell-pill {
      display: block;
      width: 7px; height: 4px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ─── SELECTED DAY DETAIL ──────────────────────────── */
    .day-detail {
      padding: 0.9rem 1rem;
      border-top: 2px solid var(--primary);
      background: var(--bg-card);
      min-height: 72px;
    }

    .detail-header {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.55rem;
    }

    .detail-list { display: grid; gap: 0.4rem; }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border-lt);
      border-left: 3px solid;
      border-radius: 0 8px 8px 0;
    }

    .detail-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .detail-empty {
      font-size: 0.82rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ─── WEEK VIEW ────────────────────────────────────── */
    .week-grid { display: grid; gap: 0; }

    .week-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      border-bottom: 1px solid var(--border-lt);
      min-height: 56px;
    }

    .week-row.today-row { background: var(--bg-stripe); }

    .week-date-col {
      border-right: 2px solid var(--border);
      padding: 0.6rem 0.7rem;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }

    .wk-short {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim);
    }

    .wk-num {
      font-family: 'Anton', sans-serif;
      font-size: 1.6rem; line-height: 1;
      color: var(--text);
    }

    .week-row.today-row .wk-num  { color: var(--primary); }
    .week-row.today-row .wk-short { color: var(--primary); }

    .week-cats-col {
      padding: 0.6rem 0.8rem;
      display: flex; flex-wrap: wrap;
      align-content: center; gap: 0.3rem;
    }

    .week-badge {
      font-size: 0.72rem; font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      border: 1.5px solid;
    }

    .week-empty {
      font-size: 0.76rem;
      color: var(--text-dim);
      font-style: italic;
      align-self: center;
    }

    /* ─── DAY VIEW ─────────────────────────────────────── */
    .day-panel { padding: 1.2rem 1rem; }

    .day-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 0.9rem;
    }

    .day-list { display: grid; gap: 0.4rem; list-style: none; }

    .day-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border-lt);
      border-left: 3px solid;
      border-radius: 0 8px 8px 0;
      background: var(--bg-card);
    }

    .day-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .day-name   { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .day-empty  { font-size: 0.84rem; color: var(--text-dim); font-style: italic; }

    /* ─── LEGEND ───────────────────────────────────────── */
    .legend {
      border-top: 1px solid var(--border);
      padding: 0.7rem 1rem;
      background: var(--bg-card);
      display: flex; flex-wrap: wrap; gap: 0.4rem 1rem;
    }

    .leg-item {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.7rem; font-weight: 600;
      color: var(--text-dim);
    }

    .leg-pill { width: 10px; height: 5px; border-radius: 2.5px; flex-shrink: 0; }

    /* ─── DESKTOP ──────────────────────────────────────── */
    @media (min-width: 680px) {
      .topbar { padding: 0 1.5rem; }
      .hero   { padding: 1.8rem 2rem 1.5rem; }
      .hero-num { font-size: 5rem; }
      .hero-cats { padding: 0.8rem 2rem; }
      .cal-header { padding: 0.75rem 1.5rem; }
      .month-cell { min-height: 68px; padding: 6px 0 10px; }
      .cell-num   { width: 36px; height: 36px; font-size: 16px; }
      .cell-pill  { width: 9px; height: 5px; }
      .day-detail { padding: 1rem 1.5rem; }
      .week-row   { min-height: 62px; }
      .day-panel  { padding: 1.5rem 2rem; }
      .legend     { padding: 0.75rem 1.5rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-brand">LÍPA — SVOZ ODPADŮ</span>
    <div class="topbar-right">
      <span class="topbar-year">2026</span>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Přepnout světlé/tmavé téma">
        <!-- Sun icon (shown in dark mode → switch to light) -->
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2"  x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2"  y1="12" x2="5"  y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
          <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
          <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in light mode → switch to dark) -->
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- HERO: NEXT PICKUP -->
  <div class="hero">
    <p class="hero-label">Nejbližší svoz</p>
    <div class="hero-body" id="hero-body"></div>
    <div class="hero-bottom-line" aria-hidden="true"></div>
  </div>

  <!-- CATEGORY BADGES -->
  <div class="hero-cats" id="hero-cats"></div>

  <!-- CALENDAR -->
  <section class="calendar">
    <div class="cal-header">
      <div class="view-switch">
        <button class="view-btn active" data-view="month" onclick="switchView('month')">Měsíc</button>
        <button class="view-btn"        data-view="week"  onclick="switchView('week')">Týden</button>
        <button class="view-btn"        data-view="day"   onclick="switchView('day')">Den</button>
      </div>
      <div class="nav-row">
        <button class="nav-btn" onclick="navigate(-1)" aria-label="Předchozí">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <p class="interval-lbl" id="interval-lbl"></p>
        <button class="nav-btn" onclick="navigate(1)" aria-label="Další">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
    <div class="cal-body" id="cal-body"></div>
    <div class="legend"   id="legend"></div>
  </section>

</div>

<script>
  /* ── Category definitions with WCAG-AA colors for both themes ──
     lightColor: ≥4.5:1 contrast ratio on #ffffff
     darkColor:  ≥4.5:1 contrast ratio on #0b140d  */
  const cats = {
    komunalni:  { name:'Komunální odpad',  lightColor:'#c0421e', darkColor:'#ff7855' },
    plasty:     { name:'Plasty',            lightColor:'#1a5bbf', darkColor:'#6aadff' },
    papir:      { name:'Papír a lepenka',   lightColor:'#7a5520', darkColor:'#d4a060' },
    sklo:       { name:'Sklo',              lightColor:'#137a50', darkColor:'#3dcc88' },
    kovy:       { name:'Kovy',              lightColor:'#3d4f70', darkColor:'#8aacdc' },
    oleje:      { name:'Oleje a tuky',      lightColor:'#8a6010', darkColor:'#f0cc40' },
    nebezpecny: { name:'Nebezpečný odpad',  lightColor:'#6b2060', darkColor:'#cc80cc' },
  };

  const events = {
    '2026-01-05': ['komunalni','plasty'],
    '2026-01-08': ['sklo'],
    '2026-01-12': ['komunalni'],
    '2026-01-15': ['sklo'],
    '2026-01-19': ['komunalni','plasty','papir'],
    '2026-01-22': ['sklo','kovy'],
    '2026-01-26': ['komunalni'],
    '2026-01-29': ['sklo','nebezpecny'],
    '2026-02-02': ['komunalni','plasty'],
    '2026-02-09': ['komunalni'],
    '2026-02-12': ['sklo','kovy'],
    '2026-02-16': ['komunalni','plasty','papir'],
  };

  const TODAY      = new Date(2026, 0, 14);
  const CZ_LONG    = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
  const CZ_LONG_UP = ['NEDĚLE','PONDĚLÍ','ÚTERÝ','STŘEDA','ČTVRTEK','PÁTEK','SOBOTA'];
  const CZ_MON     = ['LEDEN','ÚNOR','BŘEZEN','DUBEN','KVĚTEN','ČERVEN','ČERVENEC','SRPEN','ZÁŘÍ','ŘÍJEN','LISTOPAD','PROSINEC'];
  const CZ_MON_G   = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];

  /* ── Helpers ───────────────────────────────────────────── */
  function toISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function getWeekStart(d) { return addDays(d, -((d.getDay()+6)%7)); }
  function getCats(d) { return (events[toISO(d)]||[]).map(id=>cats[id]).filter(Boolean); }

  /* Returns the right category color for the current theme */
  function getColor(c) {
    return document.documentElement.dataset.theme === 'dark' ? c.darkColor : c.lightColor;
  }

  /* ── Theme management ──────────────────────────────────── */
  function setTheme(t) {
    document.documentElement.dataset.theme = t;
    localStorage.setItem('jl-theme', t);
    // Re-render to swap category colors
    renderHero();
    renderLegend();
    render();
  }

  function toggleTheme() {
    const html = document.documentElement;
    html.classList.add('theme-switching');
    setTimeout(() => html.classList.remove('theme-switching'), 320);
    setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark');
  }

  function initTheme() {
    const saved = localStorage.getItem('jl-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(saved || (prefersDark ? 'dark' : 'light'));
  }

  /* ── App state ─────────────────────────────────────────── */
  let view = 'month';
  let cursor = new Date(TODAY);
  let selectedDate = new Date(TODAY);

  /* ── View switching / navigation ───────────────────────── */
  function switchView(v) {
    view = v;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view===v));
    render();
  }

  function navigate(dir) {
    if (view==='month')      cursor = new Date(cursor.getFullYear(), cursor.getMonth()+dir, 1);
    else if (view==='week')  cursor = addDays(cursor, dir*7);
    else                     cursor = addDays(cursor, dir);
    render();
  }

  function intervalLabel() {
    if (view==='month') return `${CZ_MON[cursor.getMonth()]} ${cursor.getFullYear()}`;
    if (view==='week') {
      const ws=getWeekStart(cursor), we=addDays(ws,6);
      return `${ws.getDate()}.–${we.getDate()}. ${CZ_MON_G[we.getMonth()]}`;
    }
    return `${CZ_LONG_UP[cursor.getDay()]} ${cursor.getDate()}.`;
  }

  /* ── Hero rendering ────────────────────────────────────── */
  function renderHero() {
    const today = toISO(TODAY);
    const next  = Object.keys(events).sort().find(d => d >= today);
    if (!next) return;

    const d    = new Date(next);
    const diff = Math.round((d - TODAY) / 86400000);
    const lead = diff===0 ? 'DNES' : diff===1 ? 'ZÍTRA' : CZ_LONG_UP[d.getDay()];
    const cs   = (events[next]||[]).map(id=>cats[id]).filter(Boolean);

    document.getElementById('hero-body').innerHTML = `
      <div>
        <p class="hero-lead">${lead}<br>${d.getDate()}. ${CZ_MON_G[d.getMonth()]} ${d.getFullYear()}</p>
        <p class="hero-date">${CZ_LONG[d.getDay()]}</p>
      </div>
      <div class="hero-count">
        <p class="hero-num">${diff}</p>
        <p class="hero-unit">dní</p>
      </div>
    `;

    const catEl = document.getElementById('hero-cats');
    catEl.innerHTML = `<span class="hero-cats-label">Typ:</span>`;
    cs.forEach(c => {
      const col = getColor(c);
      catEl.innerHTML += `<span class="cat-badge" style="border-color:${col};color:${col}">
        <span class="cat-badge-dot" style="background:${col}"></span>${c.name}
      </span>`;
    });
  }

  function renderLegend() {
    document.getElementById('legend').innerHTML = Object.entries(cats).map(([,c]) => {
      const col = getColor(c);
      return `<span class="leg-item"><span class="leg-pill" style="background:${col}"></span>${c.name}</span>`;
    }).join('');
  }

  /* ── Month view ────────────────────────────────────────── */
  function selectDate(d) {
    selectedDate = d;
    document.querySelectorAll('.month-cell').forEach(el => {
      el.classList.toggle('selected', el.dataset.iso === toISO(d));
    });
    renderDayDetail(d);
  }

  function renderDayDetail(d) {
    const el = document.querySelector('.day-detail');
    if (!el) return;
    const cs = getCats(d);
    el.querySelector('.detail-header').textContent = `${CZ_LONG[d.getDay()]} ${d.getDate()}. ${CZ_MON_G[d.getMonth()]}`;
    const list = el.querySelector('.detail-list');
    list.innerHTML = cs.length
      ? cs.map(c => {
          const col = getColor(c);
          return `<div class="detail-item" style="border-left-color:${col}">
            <span class="detail-name">${c.name}</span>
          </div>`;
        }).join('')
      : `<p class="detail-empty">Bez svozu.</p>`;
  }

  function renderMonth() {
    const ms = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    const gs = getWeekStart(ms);
    const me = new Date(cursor.getFullYear(), cursor.getMonth()+1, 0);
    let ge = addDays(me, (7-((me.getDay()+6)%7+1))%7);
    if (ge < me) ge = addDays(ge, 7);

    const WD = ['Po','Út','St','Čt','Pá','So','Ne'];
    let html = `<div class="weekday-row">`;
    WD.forEach((lbl,i) => html += `<div class="weekday-lbl${i>=5?' weekend':''}">${lbl}</div>`);
    html += `</div><div class="month-grid">`;

    let d = new Date(gs);
    while (d <= ge) {
      const iso    = toISO(d);
      const isToday = sameDay(d, TODAY);
      const isCur   = d.getMonth() === cursor.getMonth();
      const dow     = (d.getDay()+6)%7;
      const isWE    = dow >= 5;
      const cs      = getCats(d);
      const isSel   = sameDay(d, selectedDate);

      let cls = 'month-cell';
      if (isToday)    cls += ' today';
      else if (isWE)  cls += ' weekend';
      if (!isCur)     cls += ' other-month';
      if (isSel)      cls += ' selected';

      const pills = cs.slice(0,4).map(c => {
        const col = getColor(c);
        return `<span class="cell-pill" style="background:${col}"></span>`;
      }).join('');

      html += `<div class="${cls}" data-iso="${iso}" onclick="selectDate(new Date('${iso}'))">
        <div class="cell-num">${d.getDate()}</div>
        <div class="cell-pills">${pills}</div>
      </div>`;
      d = addDays(d,1);
    }

    html += `</div>
    <div class="day-detail">
      <p class="detail-header"></p>
      <div class="detail-list"></div>
    </div>`;
    return html;
  }

  /* ── Week view ─────────────────────────────────────────── */
  function renderWeek() {
    const ws = getWeekStart(cursor);
    const WD = ['Po','Út','St','Čt','Pá','So','Ne'];
    let html = '';
    for (let i=0; i<7; i++) {
      const d       = addDays(ws, i);
      const isToday = sameDay(d, TODAY);
      const cs      = getCats(d);
      const dow     = (d.getDay()+6)%7;
      html += `<div class="week-row${isToday?' today-row':''}">
        <div class="week-date-col">
          <p class="wk-short">${WD[dow]}</p>
          <p class="wk-num">${d.getDate()}</p>
        </div>
        <div class="week-cats-col">
          ${cs.length
            ? cs.map(c => {
                const col = getColor(c);
                return `<span class="week-badge" style="color:${col};border-color:${col}50;background:${col}0f">${c.name}</span>`;
              }).join('')
            : `<span class="week-empty">Bez svozu</span>`}
        </div>
      </div>`;
    }
    return `<div class="week-grid">${html}</div>`;
  }

  /* ── Day view ──────────────────────────────────────────── */
  function renderDay() {
    const cs = getCats(cursor);
    const items = cs.length
      ? `<ul class="day-list">${cs.map(c => {
          const col = getColor(c);
          return `<li class="day-item" style="border-left-color:${col}">
            <span class="day-swatch" style="background:${col}"></span>
            <span class="day-name">${c.name}</span>
          </li>`;
        }).join('')}</ul>`
      : `<p class="day-empty">V tento den není naplánovaný svoz.</p>`;

    return `<div class="day-panel">
      <p class="day-title">${CZ_LONG_UP[cursor.getDay()]} ${cursor.getDate()}. ${CZ_MON[cursor.getMonth()]} ${cursor.getFullYear()}</p>
      ${items}
    </div>`;
  }

  /* ── Main render ───────────────────────────────────────── */
  function render() {
    document.getElementById('interval-lbl').textContent = intervalLabel();
    const b = document.getElementById('cal-body');
    if (view==='month') {
      b.innerHTML = renderMonth();
      renderDayDetail(selectedDate);
    } else if (view==='week') {
      b.innerHTML = renderWeek();
    } else {
      b.innerHTML = renderDay();
    }
  }

  /* ── Init ──────────────────────────────────────────────── */
  initTheme();

  // Listen for OS preference changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('jl-theme')) setTheme(e.matches ? 'dark' : 'light');
  });
</script>
</body>
</html>
